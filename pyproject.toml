[project]
name = "viewlyt"
version = "0.1.0"
description = "Scrape a YouTube video's comments (likes, dates, replies) and transcript into text files, using Selenium."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Lucas Hideki", email = "lucas.hideki.07@gmail.com" },
]
keywords = [
    "youtube",
    "comments",
    "transcript",
    "scraper",
    "selenium",
    "cli",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
    "Topic :: Text Processing :: Markup :: HTML",
    "Topic :: Utilities",
]
dependencies = [
    "selenium>=4.21",
    "tqdm>=4.66.3",  # >=4.66.3 clears CVE-2024-34062 (we use only the progress API)
]

[project.urls]
Homepage = "https://github.com/LkHideki/viewlyt"
Repository = "https://github.com/LkHideki/viewlyt"
Issues = "https://github.com/LkHideki/viewlyt/issues"

[project.scripts]
viewlyt = "viewlyt.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/viewlyt"]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "pytest>=8",
    "pre-commit>=3.7",
]

[tool.ruff]
line-length = 100
extend-exclude = ["out", "out_test"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]  # line length is handled by the formatter; don't flag long strings

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
