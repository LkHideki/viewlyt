[project]
name = "ytcomments"
version = "0.1.0"
description = "Scrape all loaded comments from a YouTube video into <video_id>.txt using Selenium."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "selenium>=4.21",
    "tqdm>=4.66",
]

[project.scripts]
ytcomments = "ytcomments.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ytcomments"]
